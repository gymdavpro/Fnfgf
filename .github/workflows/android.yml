name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Мы временно убрали кэширование, чтобы грязный кэш не ломал сборку. 
    # Как только всё соберётся успешно один раз, кэш можно будет вернуть.

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 virtualenv buildozer

    - name: Clear and Build with Buildozer
      run: |
        # Очищаем старые остатки сборки внутри контейнера
        buildozer android clean
        # Запускаем чистую сборку с авто-согласием на лицензии SDK
        buildozer -v android debug --auto-accept
        
