name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libffi-dev libsqlite3-dev tk-dev libgstreamer1.0-dev glib-2.0-dev libcairo2-dev libpango1.0-dev libgl1-mesa-dev libgstreamer-plugins-base1.0-dev

    - name: Pre-install Android Build-Tools (Fix AIDL Error)
      run: |
        # Устанавливаем нужные build-tools в системный Android SDK
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;33.0.2" "platforms;android-33"

    - name: Create Symlinks for Buildozer (Fix SDK and Sdkmanager paths)
      run: |
        # Создаем структуру папок для Buildozer
        mkdir -p /home/runner/.buildozer/android/platform
        
        # Ссылка на весь Android SDK
        ln -s $ANDROID_HOME /home/runner/.buildozer/android/platform/android-sdk
        
        # Решаем проблему с путем sdkmanager:
        # Buildozer ищет его в android-sdk/tools/bin/sdkmanager, 
        # сделаем ссылку из cmdline-tools в старый путь tools
        mkdir -p $ANDROID_HOME/tools
        ln -s $ANDROID_HOME/cmdline-tools/latest/bin $ANDROID_HOME/tools/bin

    - name: Install Python build tools
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 virtualenv buildozer

    - name: Build with Buildozer
      run: |
        export ANDROIDSDK=/home/runner/.buildozer/android/platform/android-sdk
        export ANDROIDNDK=$ANDROID_NDK_HOME
        buildozer -v android debug --auto-accept
        
